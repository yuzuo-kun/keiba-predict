<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地方競馬予想</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐎</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="container">

    <!-- 検索画面 -->
    <div id="searchDiv">
        <h1>地方競馬予想</h1>

        <input
            id="raceUrl"
            type="text"
            placeholder="出馬表URL">

        <button id="predictBtn">
            予想開始
        </button>
    </div>

    <!-- 結果画面 -->
    <div id="resultDiv" style="display: none;">
        <h1>予想結果</h1>

        <div id="raceInfo"></div>

        <div id="overallRanking">
            <h2>総合順位</h2>
            <div id="overallRankingList"></div>
        </div>

        <div id="settings">
            <h2>集計設定</h2>
            <div id="evaluationSettings"></div>
        </div>

        <div id="horseResults"></div>

        <button id="backBtn">戻る</button>
        <button id="recalcBtn">再計算</button>
    </div>

</div>

<script src="/static/js/main.js"></script>

</body>

</html>
